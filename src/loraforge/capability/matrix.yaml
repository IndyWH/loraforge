# LoRAForge capability matrix — versioned DATA, not code.
#
# What fits on which card lives here so the community can extend it with PRs
# ("FLUX at 512px works on my 3060 12GB with these settings") without touching
# app logic. The resolver picks, for each model family, the best preset whose
# constraints the probed hardware satisfies — or produces a human-readable
# reason why nothing fits.
#
# vram numbers are the FREE VRAM required (MB), measured with the desktop
# running, latents/text-embeds precached, SDPA attention. Conservative on
# purpose: a preset that OOMs once costs more trust than 5% unused headroom.

schema_version: 1

features:
  fp8_base:
    min_arch: ada            # sm_89+; halves frozen-base memory on RTX 40/50
  blackwell_wheels:
    arch: blackwell          # sm_120 needs torch built for cu128+
    min_torch_cuda: "12.8"

models:
  sdxl:
    display_name: "Stable Diffusion XL"
    engine: kohya
    # Where the weights come from. `file` means a single-file checkpoint out
    # of the repo; assets are extra components some engines need alongside it.
    source:
      repo: stabilityai/stable-diffusion-xl-base-1.0
      file: sd_xl_base_1.0.safetensors
      download_gb: 7
      gated: false
    # Thresholds measured 2026-07-19 on an RTX 4090/24GB (WSL2, bf16,
    # AdamW8bit, latents precached), per decision 20:
    #   b4 + checkpointing @1024 → ~12.3GB appetite, 1.63 s/step
    #   b2 + checkpointing @1024 → ~10.4GB appetite, 1.0–1.2 s/step
    # The former comfortable (b4, NO checkpointing) exceeded 24GB and spilled
    # silently into system RAM at ~46 s/step — no gaming card fits it.
    # max_seconds_per_step is the spill guard (decision 20): generous — the
    # ceiling is far above any healthy card, because spill is ~40x, not ~20%.
    presets:
      - name: comfortable
        min_free_vram_mb: 14000
        settings: {resolution: 1024, batch_size: 4, gradient_checkpointing: true,
                   max_seconds_per_step: 30}
      # standard: 10.4GB measured appetite × ~10% headroom ≈ 11.4GB free.
      # A 3060 12GB typically clears this; record a real 3060 run when one exists.
      - name: standard
        min_free_vram_mb: 11400
        settings: {resolution: 1024, batch_size: 2, gradient_checkpointing: true,
                   max_seconds_per_step: 25}
      # tight: measured 2026-07-21 on the RTX 4090 (768/b1/ckpt, previews
      # every 200 steps, full 1500-step runs), per decisions 20/21:
      #   TE cache ON:  peak 10.2GB card total incl. 7 sample events, minus
      #                 3.45GB desktop baseline → ~6.8GB appetite, 0.73 s/step
      #   TE cache OFF (baseline): spot 12.5GB total at step 144 → ~9.1GB
      #                 appetite, 1.0 s/step — the cache frees >2GB here
      # Sampling stayed flat with the cache on (text encoders remain on CPU).
      # unet-only is the trade (decision 21); 7000 threshold confirmed.
      - name: tight
        min_free_vram_mb: 7000
        settings: {resolution: 768, batch_size: 1, gradient_checkpointing: true,
                   cache_text_encoder_outputs: true, max_seconds_per_step: 20}
    not_available_reason: "SDXL LoRA needs ~7GB free VRAM even at 768px."

  flux_dev:
    display_name: "FLUX.1-dev"
    engine: kohya
    source:
      repo: black-forest-labs/FLUX.1-dev
      file: flux1-dev.safetensors
      download_gb: 35
      gated: true            # user must accept BFL license; token via `hf auth login`
      # kohya's flux script wants the text encoders and VAE as separate files;
      # asset names must match MODEL_SPECS.required_assets in engines/kohya.py.
      assets:
        clip_l: {repo: comfyanonymous/flux_text_encoders, file: clip_l.safetensors}
        t5xxl: {repo: comfyanonymous/flux_text_encoders, file: t5xxl_fp16.safetensors}
        ae: {repo: black-forest-labs/FLUX.1-dev, file: ae.safetensors}
    presets:
      # Spill ceilings here are extra-generous: flux is unmeasured and block
      # swap makes slow cards legitimately slow (decision 20).
      - name: comfortable
        min_free_vram_mb: 22000
        settings: {resolution: 1024, batch_size: 1, fp8_base: true, blocks_to_swap: 0,
                   max_seconds_per_step: 120}
      - name: standard
        min_free_vram_mb: 15000
        settings: {resolution: 1024, batch_size: 1, fp8_base: true, blocks_to_swap: 18,
                   max_seconds_per_step: 240}
      - name: tight
        min_free_vram_mb: 11000
        settings: {resolution: 512, batch_size: 1, fp8_base: true, blocks_to_swap: 34,
                   max_seconds_per_step: 240}
        min_ram_mb: 32000    # aggressive block swap needs host RAM to swap into
    not_available_reason: >-
      FLUX LoRA needs ~11GB free VRAM (with fp8 base + block swap) and 32GB
      RAM. SDXL is the best quality option for this card.

  sd15:
    display_name: "Stable Diffusion 1.5"
    engine: kohya
    source:
      # runwayml/stable-diffusion-v1-5 was removed from HF; this is the
      # maintained community mirror of the same weights.
      repo: stable-diffusion-v1-5/stable-diffusion-v1-5
      file: v1-5-pruned-emaonly.safetensors
      download_gb: 4
      gated: false
    presets:
      # sd15 is unmeasured; ceilings are generous multiples of typical rates.
      - name: standard
        min_free_vram_mb: 5500
        settings: {resolution: 512, batch_size: 4, gradient_checkpointing: false,
                   max_seconds_per_step: 15}
      - name: tight
        min_free_vram_mb: 3800
        settings: {resolution: 512, batch_size: 1, gradient_checkpointing: true,
                   max_seconds_per_step: 15}
    not_available_reason: "SD1.5 LoRA needs ~4GB free VRAM — very few cards fall below this."
